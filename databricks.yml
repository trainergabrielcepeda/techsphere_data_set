# Databricks Asset Bundle — Dataset Seguimiento Post-Operatorio (Tech Sphere 2026)
# Diseño Técnico §11: pipeline completo (clusters, jobs, permisos) como código,
# desplegable a un workspace dev y luego al de entrega, versionado en Git.
#
# Despliegue:
#   databricks bundle validate -t dev
#   databricks bundle deploy   -t dev
#   databricks bundle run postop_pipeline -t dev
#
# Workspace host y credenciales NUNCA se fijan aquí: se resuelven vía perfil de
# `databricks configure` o las variables de entorno DATABRICKS_HOST / DATABRICKS_TOKEN
# al momento de `bundle deploy` (§13 — nada de secretos ni URLs de workspace en el repo).

bundle:
  name: postop_dataset

variables:
  catalog_name:
    description: Catálogo Unity Catalog dedicado al reto (ver conf/project.yml)
    default: postop_dataset
  llm_secret_scope:
    description: >-
      Databricks Secret Scope con la credencial del LLM externo (§8.2, §13) — clave
      openrouter-api-key para el camino OpenRouter (Plan 06, primario) o anthropic-api-key
      para el camino Anthropic (Plan 08, alternativo, sin cuota diaria de cuenta)
    default: postop-llm-secrets
  llm_provider:
    description: >-
      Proveedor LLM para simulate_dual_llm — "anthropic" (Plan 08, primario desde la
      corrida de 10 pacientes de Plan 07/08 — sin la cuota diaria de OpenRouter, validado
      con un spike real de 2 turnos contra claude-sonnet-5), "openrouter" (Plan 06,
      camino previo, bloqueado por cuota diaria hasta que resetee), o "databricks" (Model
      Serving, sin validar)
    default: anthropic
  openrouter_model:
    description: >-
      Modelo ":free" primario en OpenRouter (usado solo si llm_provider=openrouter) —
      elegido en Plan 06 Fase 0 tras probar 6 candidatos contra el catálogo real; recae
      automáticamente en openrouter/free si agota sus reintentos (ver simulate_dual_llm.py)
    default: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
  anthropic_model:
    description: >-
      Modelo de la API de Anthropic (usado solo si llm_provider=anthropic, Plan 08) — el
      modelo presupuestado explícitamente para la corrida de 10 pacientes de Plan 07/08
    default: claude-sonnet-5
  max_tokens:
    description: >-
      Tope de tokens de salida por turno agente/paciente (Plan 07/08) — aplica por igual a
      openrouter y anthropic, para mantener las conversaciones breves. Punto de partida sin
      validar empíricamente contra los modelos reales; confirmar con una llamada de spike
      antes de una corrida real.
    default: "500"
  model_serving_endpoint:
    description: Nombre del endpoint de Databricks Model Serving usado por simulate_dual_llm (§8.2) — solo si llm_provider=databricks, sin validar en Free Edition
    default: ""
  pilot_n_pacientes:
    description: >-
      Tamaño de la corrida (§14) — 40 pacientes (Plan 09, escalado desde los 10 de Plan
      07/08 para más diversidad de arquetipos). IDs deterministas por índice
      (generate_synthea_profiles.py) — escalar este valor extiende la población sin
      alterar el contenido de los pacientes ya generados con un valor menor.
    default: "40"

include:
  - resources/*.yml

# dev y prod se despliegan al MISMO workspace: Databricks Free Edition permite un solo
# workspace/metastore por cuenta (Plan 02), así que la separación aquí es solo de
# catálogo, no de infraestructura.
targets:
  dev:
    mode: development
    default: true
    variables:
      catalog_name: postop_dataset_dev

  prod:
    mode: production
    variables:
      catalog_name: postop_dataset
    # Sin run_as: Free Edition no tiene SSO/SCIM ni account console, por lo que no hay
    # grupos que asignar (Plan 02) — corre como el usuario que despliega el bundle.
